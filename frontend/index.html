<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnecThor • Plataforma de Mentorías</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Fondo claro y limpio, idéntico al de tus vistas de login y registro */
        body { 
            background-color: #F8FAFC; /* Slate 50 */
            font-family: 'Inter', sans-serif; 
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col font-sans antialiased selection:bg-blue-600 selection:text-white">

    <!-- Navegación Premium Adaptativa (Estilo Claro) -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200/80 px-6 py-4 transition-all duration-300">
        <div class="max-w-6xl mx-auto flex flex-row justify-between items-center gap-4">
            
            <!-- Logo con Branding -->
            <a href="#/" class="flex items-center gap-2 group">
                <span class="text-xl font-black tracking-tighter uppercase text-slate-800">
                    CONNEC<span class="bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent group-hover:from-blue-500 group-hover:to-indigo-500 transition-colors">THOR</span>
                </span>
                <span class="px-1.5 py-0.5 text-[9px] font-black tracking-wider uppercase bg-blue-100 text-blue-600 border border-blue-200 rounded">
                    BETA
                </span>
            </a>

            <!-- Contenedor Derecho: Links + Cerrar Sesión -->
            <div class="flex items-center gap-4">
                <!-- Enlaces de Navegación de la SPA (Estilo Claro) -->
                <div class="flex gap-1 items-center bg-slate-100 p-1 rounded-full border border-slate-200/60">
                    <a href="#/" class="px-4 py-1.5 rounded-full text-[11px] uppercase font-bold tracking-wider text-slate-600 hover:text-slate-900 hover:bg-white/80 transition-all duration-200">
                        Mentores
                    </a>
                    <a href="#/citas" class="px-4 py-1.5 rounded-full text-[11px] uppercase font-bold tracking-wider text-slate-600 hover:text-slate-900 hover:bg-white/80 transition-all duration-200">
                        Mis Citas
                    </a>
                </div>

                <!-- Botón de Cerrar Sesión Operativo -->
                <button id="btn-logout" class="p-2 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-full border border-transparent hover:border-red-100 transition-all duration-200 cursor-pointer" title="Cerrar Sesión">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4.5 h-4.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" />
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <!-- Contenedor Reactivo Único con Degradado Suave de Fondo -->
    <main id="app" class="flex-grow max-w-6xl w-full mx-auto px-6 py-8 relative">
        <!-- Glows de Fondo Decorativos Sutiles para Entorno Claro -->
        <div class="absolute top-0 left-1/4 w-96 h-96 bg-blue-400/5 rounded-full blur-[120px] pointer-events-none"></div>
        <div class="absolute bottom-10 right-1/4 w-96 h-96 bg-indigo-400/5 rounded-full blur-[120px] pointer-events-none"></div>
    </main>

    <!-- Footer Minimalista (Estilo Claro) -->
    <footer class="bg-white border-t border-slate-200/80 text-center py-6">
        <div class="max-w-6xl mx-auto px-6 flex flex-col sm:flex-row justify-between items-center gap-3 text-[10px] uppercase font-mono tracking-widest text-slate-400">
            <span>© 2026 ConnecThor • Plataforma de Mentorías</span>
            <span class="flex items-center gap-1.5">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                Servicio Conectado • Base de Datos Activa
            </span>
        </div>
    </footer>

    <script type="module" src="/src/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Tutorías Académicas</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>body { background-color: #020617; }</style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col font-sans">

    <!-- Navegación Operativa Adaptativa -->
    <nav class="bg-slate-900 border-b border-slate-800 px-6 py-4">
        <div class="max-w-6xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <a href="#/" class="text-md font-black tracking-tighter uppercase text-slate-100">
                TUTOR<span class="text-red-500">MATCH</span>
            </a>
            
            <!-- Links de la SPA -->
            <div class="flex gap-4 items-center">
                <a href="#/" class="text-xs uppercase font-extrabold tracking-widest text-slate-400 hover:text-slate-100 transition-colors">Tutores</a>
                <a href="#/citas" class="text-xs uppercase font-extrabold tracking-widest text-slate-400 hover:text-slate-100 transition-colors">Panel Citas</a>
            </div>

            <!-- Selector de Sesión Simple -->
            <div class="flex items-center gap-2 bg-slate-950 border border-slate-800 p-1.5">
                <span class="text-[10px] font-black uppercase tracking-wider text-slate-500 pl-2">CUENTA:</span>
                <select id="selector-rol" class="bg-slate-900 text-red-500 border-none p-1 text-xs font-black uppercase tracking-wider focus:outline-none">
                    <option value="ESTUDIANTE">ESTUDIANTE</option>
                    <option value="TUTOR">TUTOR (DOCENTE)</option>
                </select>
            </div>
        </div>
    </nav>

    <!-- Contenedor Reactivo Único -->
    <main id="app" class="flex-grow"></main>

    <footer class="bg-slate-950 border-t border-slate-900 text-center py-4 text-[10px] uppercase font-mono tracking-widest text-slate-600">
        Plataforma Modular Base • Control de Roles Simples de Simulación
    </footer>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
